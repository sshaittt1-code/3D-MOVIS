name: Build Android TV APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch: # Allows manual trigger

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-android:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Dependencies
        run: npm install

      - name: Build Web App (creates dist/)
        run: npm run build

      - name: Sync Capacitor (copies dist/ into Android assets)
        run: npx cap sync android

      - name: Override local.properties with CI Android SDK path
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties
          echo "Using SDK at: $ANDROID_SDK_ROOT"

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: HoloCinema-TV-App
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
