name: Build Android TV APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch: # Allows manual trigger

jobs:
  build-android:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install Dependencies
        run: npm install

      - name: Build Web App
        run: npm run build

      - name: Initialize Android Project
        run: npx cap add android

      - name: Patch AndroidManifest for TV Support
        run: |
          # Add LEANBACK_LAUNCHER category to make it show up on Android TV home screen
          sed -i 's/<category android:name="android.intent.category.LAUNCHER" \/>/<category android:name="android.intent.category.LAUNCHER" \/>\n                <category android:name="android.intent.category.LEANBACK_LAUNCHER" \/>/g' android/app/src/main/AndroidManifest.xml
          
          # Add Leanback feature requirement (false means it works on both TV and phones)
          sed -i '/<application/i \    <uses-feature android:name="android.software.leanback" android:required="false" \/>\n    <uses-feature android:name="android.hardware.touchscreen" android:required="false" \/>' android/app/src/main/AndroidManifest.xml

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v3
        with:
          name: HoloCinema-TV-App
          path: android/app/build/outputs/apk/debug/app-debug.apk
